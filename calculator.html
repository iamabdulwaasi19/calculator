<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <!-- First Row -->
             <button class="special" id="clear">AC</button>
             <button class="special" id="memory">MC</button>
             <button class="operation" data-operation="%" id="percent">%</button>
             <button class="operation" data-operation="/">/</button>
        

            <!-- Second Row -->
            <button class="number" data-operation="number">7</button>
            <button class="number" data-operation="number">8</button>
            <button class="number" data-operation="number">9</button>
            <button class="operation" data-operation="*">*</button>

            <!-- Third Row -->
            <button class="number" data-operation="number">4</button>
            <button class="number" data-operation="number">5</button>
            <button class="number" data-operation="number">6</button>
            <button class="operation" data-operation="-">-</button>

            <!-- Fourth Row -->
            <button class="number" data-operation="number">1</button>
            <button class="number" data-operation="number">2</button>
            <button class="number" data-operation="number">3</button>
            <button class="operation" data-operation="+">+</button>

            <!-- Fifth Row -->
            <button class="number zero" data-operation="0">0</button>
            <button class="number" id="decimal">.</button>
            <button class="operation" id="equals">=</button>
        </div>
    </div>

    <script src="calculator.js"></script>

</body>
</html>
