<!doctype html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="calculator.png" />
    <title>Red Calculator</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="display" id="display">0</div>
      <div class="buttons">
        <!-- First Row -->
        <button class="special" id="clear">AC</button>
        <button class="special" id="memory">MC</button>
        <button class="operation" data-operation="%" id="percent">%</button>
        <button class="operation" data-operation="/">/</button>

        <!-- Second Row -->
        <button class="number" data-number="7">7</button>
        <button class="number" data-number="8">8</button>
        <button class="number" data-number="9">9</button>
        <button class="operation" data-operation="*">*</button>

        <!-- Third Row -->
        <button class="number" data-number="4">4</button>
        <button class="number" data-number="5">5</button>
        <button class="number" data-number="6">6</button>
        <button class="operation" data-operation="-">-</button>

        <!-- Fourth Row -->
        <button class="number" data-number="1">1</button>
        <button class="number" data-number="2">2</button>
        <button class="number" data-number="3">3</button>
        <button class="operation" data-operation="+">+</button>

        <!-- Fifth Row -->
        <button class="number zero" data-number="0">0</button>
        <button class="number" id="decimal">.</button>
        <button class="operation" id="equals">=</button>
      </div>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>
